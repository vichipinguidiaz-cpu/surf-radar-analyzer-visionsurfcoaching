      const container = document.getElementById(`${qType}-${axKey}`);

      const chart = document.querySelector("[id*='" + axKey + "']").closest(".bg-slate-900") ? 
        ["technical", "physical", "psych"].find(c => AXES[c].some(a => a.key === axKey)) : null;

      options.forEach((opt, i) => {
        const btn = document.createElement("button");
        btn.className = `px-1 py-2 rounded-lg text-[10px] sm:text-xs font-medium leading-tight border transition-colors ${
          currentValue === i ? "bg-amber-400 border-amber-400 text-slate-900" : "border-slate-600 text-slate-300 hover:border-amber-400/60"
        }`;
        btn.title = opt;
        btn.textContent = opt;
        btn.type = "button";
        btn.onclick = () => window.setAnswer(qType, axKey, i);
        container.appendChild(btn);

        root.innerHTML = `
          <div class="bg-slate-950 min-h-[640px] rounded-2xl flex flex-col items-center justify-center p-8 text-center">
            <div class="w-9 h-9 text-amber-400 mb-4">${Icons.AlertTriangle()}</div>

    // Global functions
    window.saveApiKey = () => {
      const key = document.getElementById("apiKeyInput").value.trim();
      if (key) {
        state.apiKey = key;
        localStorage.setItem("claude_api_key", key);
        render();
      }
    };

    window.setLang = (lang) => {
      state.lang = lang;
      render();
    };

    window.toggleLang = () => {
      state.lang = state.lang === "en" ? "es" : "en";
      render();
    };

    window.setAnswer = (qType, axKey, value) => {
      const chartOrder = ["technical", "physical", "psych"];
      const chart = chartOrder.find(c => AXES[c].some(a => a.key === axKey));
      if (chart) {
        state.answers[chart][axKey][qType] = value;
        renderQuestionStep();
      }
    };

    window.goStep = (step) => {
      state.step = step;
      state.showWarn = false;
      render();
    };

    window.goNext = () => {
      const chartOrder = ["technical", "physical", "psych"];
      if (state.step >= 1 && state.step <= 3) {
        const chart = chartOrder[state.step - 1];
        const valid = AXES[chart].every(ax => {
          const v = state.answers[chart][ax.key];
          return v.q1 !== null && v.q2 !== null && (!HAS_OBJ[chart] || v.obj !== null);
        });
        if (!valid) {
          state.showWarn = true;
          renderQuestionStep();
          return;
        }
      }
      state.showWarn = false;
      state.step++;
      render();
    };

    window.goBack = () => {
      if (state.step > 0) state.step--;
      state.showWarn = false;
      render();
    };

    window.submitAnalysis = async () => {
      const chartOrder = ["technical", "physical", "psych"];
      const openValid = state.answers.openGoal.trim() && state.answers.openChallenge.trim();
      if (!openValid) {
        state.showWarn = true;
        renderQuestionStep();
        return;
      }

      state.step = 5;
      state.loading = true;
      state.error = false;
      state.loadingIdx = 0;
      render();

      const interval = setInterval(() => {
        state.loadingIdx = (state.loadingIdx + 1) % STR[state.lang].loadingMsgs.length;
        render();
      }, 1700);

      try {
        const prompt = buildPrompt(chartOrder, state.lang);
        const response = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "x-api-key": state.apiKey,
          },
          body: JSON.stringify({
            model: "claude-3-5-sonnet-20241022",
            max_tokens: 1000,
            system: buildSystemPrompt(state.lang),
            messages: [{ role: "user", content: prompt }],
          }),
        });

        const data = await response.json();
        if (data.error) throw new Error(data.error.message || "API error");

        const rawText = (data.content || []).map(c => c.text || "").join("\n");
        let clean = rawText.replace(/```json/g, "").replace(/```/g, "").trim();
        const firstBrace = clean.indexOf("{");
        const lastBrace = clean.lastIndexOf("}");
        if (firstBrace !== -1 && lastBrace !== -1) clean = clean.slice(firstBrace, lastBrace + 1);
        const parsed = JSON.parse(clean);

        if (!parsed.opportunityAreas || !parsed.interpretation) throw new Error("Incomplete response");
        state.result = parsed;
      } catch (e) {
        console.error("Analysis error:", e);
        state.error = true;
      } finally {
        clearInterval(interval);
        state.loading = false;
        render();
      }
    };

    function buildPrompt(chartOrder, lang) {
      const lines = [];
      chartOrder.forEach((chart) => {
        lines.push(`\n${STR.en.chartTitles[chart]}:`);
        AXES[chart].forEach((ax) => {
          const v = state.answers[chart][ax.key];
          const actual = (SCORES[v.q1] + SCORES[v.q2]) / 2;
          const objetivo = HAS_OBJ[chart] && v.obj !== null ? SCORES[v.obj] : null;
          lines.push(`- ${ax.title.en}: current ${actual}/5${objetivo !== null ? `, target ${objetivo}/5` : ""}`);
        });
      });
      lines.push(`\nMain goal: ${state.answers.openGoal}`);
      lines.push(`Biggest challenge: ${state.answers.openChallenge}`);
      return lines.join("\n");
    }

    function buildSystemPrompt(lang) {
      const langName = lang === "es" ? "Spanish" : "English";
      return `You are a performance analyst for Vision Surf Coaching, run by Vicente, a Chilean sports science graduate and competitive surfer/coach based in Santa Teresa, Costa Rica, specialized in intermediate-to-advanced surfer progression.

You receive a surfer's self-assessment scores (1-5 scale) across three radar charts: Technical/Tactical surfing, Physical preparation & apnea, and Psychological/Habits. All three charts include a "target" score showing where they want to be.

Your job:
1. Estimate their overall surf level in one short phrase (e.g. "Upper Intermediate") based on the technical scores and their open answers.
2. Write a short interpretation (3-4 sentences) of what the radar patterns reveal — connect technical, physical and psychological dots where relevant. Frame this as observations, not commands. Don't tell them what to do — just show them where the imbalances or biggest gaps are.
3. List the 2-3 biggest opportunity areas (largest gap between current and target across any of the three charts), each with a short neutral observation (not an instruction).
4. Write a short, warm closing paragraph (2-3 sentences) that subtly connects these opportunity areas to what Vision Surf Coaching's program works on, and invites them to apply if they want to work on it — but do NOT include any URL or link, that will be added separately as a button.

Respond ONLY in valid JSON, no markdown, no code fences. Write all text in ${langName}. JSON shape:
{"levelEstimate": string, "interpretation": string, "opportunityAreas": [{"title": string, "note": string}], "closing": string}`;
    }

    window.retry = () => {
      state.error = false;
      window.submitAnalysis();
    };

    window.restart = () => {
      state.answers = emptyAnswers();
      state.result = null;
      state.error = false;
      state.step = 0;
      render();
    };

    // Initial render
    render();
  </script>
</body>
</html>
