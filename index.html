    /* ---------- radar chart (restored) ---------- */
    function polarPoint(cx, cy, r, angleDeg) {
      const rad = (angleDeg - 90) * Math.PI / 180;
      return [cx + r * Math.cos(rad), cy + r * Math.sin(rad)];
    }
    function radarSVG(data) {
      const cx = 110, cy = 110, maxR = 85, n = data.length;
      const angleStep = 360 / n;
      let gridRings = "";
      for (let ring = 1; ring <= 5; ring++) {
        const r = maxR * ring / 5;
        let pts = "";
        for (let i = 0; i < n; i++) { const [x, y] = polarPoint(cx, cy, r, i * angleStep); pts += x + "," + y + " "; }
        gridRings += `<polygon points="${pts}" fill="none" stroke="#334155" stroke-width="1"/>`;
      }
      let axisLines = "", labels = "";
      data.forEach((d, i) => {
        const [x, y] = polarPoint(cx, cy, maxR, i * angleStep);
        axisLines += `<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="#334155" stroke-width="1"/>`;
        const [lx, ly] = polarPoint(cx, cy, maxR + 16, i * angleStep);
        const words = (d.title || "").split(" ");
        labels += `<text x="${lx}" y="${ly}" fill="#fbbf24" font-size="7" text-anchor="middle">${words.slice(0, 2).join(" ")}</text>`;
      });
      function poly(key, color, opacity) {
        let pts = "";
        data.forEach((d, i) => { const val = d[key] || 0; const r = (val / 5) * maxR; const [x, y] = polarPoint(cx, cy, r, i * angleStep); pts += x + "," + y + " "; });
        return `<polygon points="${pts}" fill="${color}" fill-opacity="${opacity}" stroke="${color}" stroke-width="2"/>`;
      }
      const hasTarget = data.some(d => d.target !== null && d.target !== undefined);
      return `<svg viewBox="0 0 220 230" width="100%" height="200">
        ${gridRings}${axisLines}
        ${hasTarget ? poly("target", "#fbbf24", 0.15) : ""}
        ${poly("actual", "#22d3ee", 0.35)}
        ${labels}
      </svg>`;
    }

          return { actual: Math.round(actual * 10) / 10, target, title: ax.title[state.lang] };
        });
        scores[chart] = chartScores;
        const avgActual = chartScores.reduce((s, a) => s + a.actual, 0) / chartScores.length;
        const avgTarget = chartScores.reduce((s, a) => s + a.target, 0) / chartScores.length;
        gaps[chart] = { avgActual, avgTarget, gap: avgTarget - avgActual };
      });

      const overallScore = (scores.technical.reduce((s, a) => s + a.actual, 0) + scores.physical.reduce((s, a) => s + a.actual, 0) + scores.psych.reduce((s, a) => s + a.actual, 0)) / (AXES.technical.length + AXES.physical.length + AXES.psych.length);

      let levelEstimate = state.lang === "es" ? "Principiante" : "Beginner";
      if (overallScore >= 4.2) levelEstimate = state.lang === "es" ? "Avanzado" : "Advanced";
      else if (overallScore >= 3.5) levelEstimate = state.lang === "es" ? "Intermedio" : "Intermediate";
      else if (overallScore >= 2.8) levelEstimate = state.lang === "es" ? "Competente" : "Competent";

      const topGaps = CHART_ORDER.map(c => ({ chart: c, ...gaps[c] })).sort((a, b) => b.gap - a.gap).slice(0, 2);
      const opportunities = [];

      topGaps.forEach(g => {
        const weakAreas = scores[g.chart].filter(s => s.actual < 3).sort((a, b) => a.actual - b.actual);
        if (weakAreas.length > 0) {
          opportunities.push({ title: weakAreas[0].title, note: state.lang === "es" ? "Es tu área con mayor potencial de crecimiento" : "Your biggest growth opportunity" });
        }
      });

      if (opportunities.length < 3) {
        const allWeak = [];
        CHART_ORDER.forEach(c => {
          scores[c].forEach(s => {
            if (s.actual < 3.5 && !opportunities.find(o => o.title === s.title)) {
              allWeak.push({ title: s.title, note: state.lang === "es" ? "Merece atención dedicada" : "Needs dedicated focus" });
            }
          });
        });
        opportunities.push(...allWeak.slice(0, 3 - opportunities.length));
      }

      const interpretation = state.lang === "es"
        ? `Tu perfil muestra una combinación interesante de fortalezas y áreas de desarrollo. Con un nivel general de ${overallScore.toFixed(1)}/5, tus próximos pasos deben enfocarse en ${topGaps[0].chart === 'technical' ? 'consolidar técnica' : topGaps[0].chart === 'physical' ? 'preparación física' : 'consistencia mental'}. El coaching personalizado acelerará tu progresión.`
        : `Your profile shows interesting strengths paired with clear development areas. At a ${overallScore.toFixed(1)}/5 overall level, focus on ${topGaps[0].chart === 'technical' ? 'technique' : topGaps[0].chart === 'physical' ? 'physical prep' : 'mental consistency'}. Personalized coaching will accelerate your progress.`;

      const closing = state.lang === "es"
        ? "Estás listo para el siguiente nivel. Nuestro programa está diseñado para atletas como tú que quieren ir más allá. Postula a nuestro programa actual."
        : "You're ready for the next level. Our program is built for surfers like you who want more. Apply to our current program.";

      return { levelEstimate, interpretation, opportunityAreas: opportunities.slice(0, 3), closing, scores };
    }

    function render() {
      const t = STR[state.lang];
      const root = document.getElementById("root");

      if (state.step === 0) {
        root.innerHTML = `
          <div class="container bg-slate-950">
            <div class="bg-slate-900 rounded-2xl max-w-md w-full p-8 shadow-2xl border border-slate-800">
              <div class="flex items-center gap-2 text-amber-400 mb-6 justify-center">
                <div class="w-6 h-6">${Icons.Waves()}</div>
                <span class="text-xs font-bold tracking-wider">${t.brand}</span>
              </div>
              <p class="text-center text-slate-400 text-xs mb-2">${t.chooseLang}</p>
              <div class="grid grid-cols-2 gap-2 mb-6">
                <button onclick="window.setLang('es')" class="py-2.5 rounded-xl text-sm font-semibold border transition-colors ${state.lang === "es" ? "bg-amber-400 border-amber-400 text-slate-900" : "border-slate-600 text-slate-300"}">Español</button>
                <button onclick="window.setLang('en')" class="py-2.5 rounded-xl text-sm font-semibold border transition-colors ${state.lang === "en" ? "bg-amber-400 border-amber-400 text-slate-900" : "border-slate-600 text-slate-300"}">English</button>
              </div>
              <h1 class="text-2xl font-bold text-white mb-3">${t.landingTitle}</h1>
              <p class="text-slate-400 text-sm leading-relaxed mb-6">${t.landingDesc}</p>
              <ul class="space-y-2.5 mb-8">
                ${t.bullets.map(b => `<li class="flex items-start gap-2 text-sm text-slate-300"><span class="text-amber-400">●</span>${b}</li>`).join("")}
              </ul>
              <button onclick="window.goStep(1)" class="w-full bg-amber-400 hover:bg-amber-300 text-slate-900 font-semibold py-3 rounded-xl flex items-center justify-center gap-2">
                ${t.start} <div class="w-5 h-5">${Icons.ArrowRight()}</div>
              </button>
            </div>
          </div>
        `;
      } else if (state.step >= 1 && state.step <= 4) {
        renderQuestionStep(t);
      } else if (state.step === 5) {
        renderResults(t);
      }
    }

    function renderQuestionStep(t) {
      const root = document.getElementById("root");

      if (state.step >= 1 && state.step <= 3) {
        const chart = CHART_ORDER[state.step - 1];
        const axes = AXES[chart];

        let axesHtml = axes.map(ax => `
          <div class="mb-6 pb-5 border-b border-slate-700">
            <h3 class="text-amber-400 font-bold text-sm mb-3">${ax.title[state.lang]}</h3>
            <p class="text-slate-300 text-xs mb-2">${ax.q1.text[state.lang]}</p>
            <div class="grid grid-cols-5 gap-1.5" id="q1-${ax.key}"></div>
            <p class="text-slate-300 text-xs mb-2 mt-4">${ax.q2.text[state.lang]}</p>
            <div class="grid grid-cols-5 gap-1.5" id="q2-${ax.key}"></div>
            ${HAS_OBJ[chart] ? `<p class="text-slate-300 text-xs mb-2 mt-4">${state.lang === 'es' ? 'Objetivo' : 'Target'}: ${ax.title[state.lang]}</p><div class="grid grid-cols-5 gap-1.5" id="obj-${ax.key}"></div>` : ""}
          </div>
        `).join("");

        root.innerHTML = `
          <div class="bg-slate-950 rounded-2xl p-6">
            <div class="max-w-xl" style="margin:0 auto;">
              <div class="flex justify-between items-center mb-4">
                <div class="flex items-center gap-2 text-amber-400"><div class="w-5 h-5">${Icons.Waves()}</div><span class="text-xs font-bold">${t.brand}</span></div>
                <button onclick="window.toggleLang()" class="text-xs text-slate-400">${state.lang === "en" ? "ES" : "EN"}</button>
              </div>
              <div class="text-xs text-slate-500 mb-3">${t.step} ${state.step} ${t.of} 4</div>
              <div class="w-full h-1.5 bg-slate-800 rounded-full mb-6 overflow-hidden"><div class="h-full bg-amber-400" style="width: ${(state.step / 4) * 100}%"></div></div>
              <div class="bg-slate-900 rounded-xl p-6 border border-slate-800">
                <h2 class="font-bold text-white mb-5">${t.chartTitles[chart]}</h2>
                ${axesHtml}
                ${state.showWarn ? `<p class="text-amber-400 text-xs mb-4">${t.fieldsRequired}</p>` : ""}
                <div class="flex justify-between items-center mt-5">
                  <button onclick="window.goBack()" ${state.step === 1 ? "disabled" : ""} class="text-sm text-slate-300">${t.back}</button>
                  <button onclick="window.goNext()" class="bg-amber-400 hover:bg-amber-300 text-slate-900 font-semibold text-sm px-5 py-2.5 rounded-lg">${t.next}</button>
                </div>
              </div>
            </div>
          </div>
        `;

        axes.forEach(ax => {
          renderScaleButtons("q1", ax.key, ax.q1.opts[state.lang], state.answers[chart][ax.key].q1);
          renderScaleButtons("q2", ax.key, ax.q2.opts[state.lang], state.answers[chart][ax.key].q2);
          if (HAS_OBJ[chart]) renderScaleButtons("obj", ax.key, OBJ_OPTS[state.lang], state.answers[chart][ax.key].obj);
        });
      } else if (state.step === 4) {
        root.innerHTML = `
          <div class="bg-slate-950 rounded-2xl p-6">
            <div class="max-w-xl" style="margin:0 auto;">
              <div class="flex justify-between items-center mb-4">
                <div class="flex items-center gap-2 text-amber-400"><div class="w-5 h-5">${Icons.Waves()}</div><span class="text-xs font-bold">${t.brand}</span></div>
                <button onclick="window.toggleLang()" class="text-xs text-slate-400">${state.lang === "en" ? "ES" : "EN"}</button>
              </div>
              <div class="bg-slate-900 rounded-xl p-6 border border-slate-800">
                <h2 class="font-bold text-white mb-5">${t.openTitle}</h2>
                <div class="mb-5">
                  <label class="text-sm font-medium text-slate-300 mb-2" style="display:block;">${t.openGoal}</label>
                  <textarea id="openGoal" rows="3">${state.answers.openGoal}</textarea>
                </div>
                <div class="mb-2">
                  <label class="text-sm font-medium text-slate-300 mb-2" style="display:block;">${t.openChallenge}</label>
                  <textarea id="openChallenge" rows="3">${state.answers.openChallenge}</textarea>
                </div>
                ${state.showWarn ? `<p class="text-amber-400 text-xs mb-4">${t.fieldsRequired}</p>` : ""}
                <div class="flex justify-between items-center mt-5">
                  <button onclick="window.goBack()" class="text-sm text-slate-300">${t.back}</button>
                  <button onclick="window.submitAnalysis()" class="bg-amber-400 hover:bg-amber-300 text-slate-900 font-semibold text-sm px-5 py-2.5 rounded-lg">${t.submit}</button>
                </div>
              </div>
            </div>
          </div>
        `;
        document.getElementById("openGoal").addEventListener("change", (e) => { state.answers.openGoal = e.target.value; });
        document.getElementById("openChallenge").addEventListener("change", (e) => { state.answers.openChallenge = e.target.value; });
      }
    }

    function renderScaleButtons(qType, axKey, options, currentValue) {
      const container = document.getElementById(`${qType}-${axKey}`);
      if (!container) return;
      options.forEach((opt, i) => {
        const btn = document.createElement("button");
        btn.className = `px-1 py-2 rounded-lg text-xs font-medium leading-tight border transition-colors ${currentValue === i ? "bg-amber-400 border-amber-400 text-slate-900" : "border-slate-600 text-slate-300"}`;
        btn.style.fontSize = "10px";
        btn.textContent = opt;
        btn.type = "button";
        btn.onclick = () => window.setAnswer(qType, axKey, i);
        container.appendChild(btn);
      });
    }

    function renderResults(t) {
      const root = document.getElementById("root");
      if (state.loading) {
        root.innerHTML = `<div class="bg-slate-950 rounded-2xl flex flex-col items-center justify-center p-8" style="min-height:500px;"><div class="w-9 h-9 text-amber-400 animate-spin">${Icons.Loader2()}</div><p class="text-slate-200 font-medium mt-4">${t.loadingMsgs[state.loadingIdx]}...</p></div>`;
      } else if (state.error) {
        root.innerHTML = `<div class="bg-slate-950 rounded-2xl flex flex-col items-center justify-center p-8 text-center" style="min-height:500px;"><div class="w-9 h-9 text-amber-400 mb-4">${Icons.AlertTriangle()}</div><h2 class="font-bold text-white mb-2">${t.errorTitle}</h2><p class="text-slate-400 text-sm mb-6">${t.errorDesc}</p><button onclick="window.retry()" class="bg-amber-400 hover:bg-amber-300 text-slate-900 font-semibold px-6 py-2.5 rounded-xl">${t.retry}</button></div>`;
      } else if (state.result) {
        const oppHtml = (state.result.opportunityAreas || []).map((o, i) => `<div class="flex gap-3 mb-3"><div class="w-6 h-6 rounded-full bg-amber-400 text-slate-900 text-xs font-bold flex items-center justify-center" style="flex-shrink:0;">${i + 1}</div><div><p class="font-semibold text-white text-sm">${o.title}</p><p class="text-slate-400 text-sm mt-0.5">${o.note}</p></div></div>`).join("");

        const chartsHtml = CHART_ORDER.map(chart => `
          <div class="chart-card">
            <h3>${t.chartTitles[chart]}</h3>
            ${radarSVG(state.result.scores[chart])}
            <div class="legend"><span><span class="dot" style="background:#22d3ee"></span>${t.actualLabel}</span>${HAS_OBJ[chart] ? `<span><span class="dot" style="background:#fbbf24"></span>${t.objLabel}</span>` : ""}</div>
          </div>
        `).join("");

        root.innerHTML = `
          <div class="bg-slate-950 rounded-2xl p-6">
            <div class="max-w-3xl" style="margin:0 auto;">
              <div class="flex justify-between items-center mb-6">
                <div class="flex items-center gap-2 text-amber-400"><div class="w-5 h-5">${Icons.Waves()}</div><span class="text-xs font-bold">${t.brand}</span></div>
                <button onclick="window.restart()" class="text-xs text-slate-400">${t.startOver}</button>
              </div>
              <h1 class="text-xl font-bold text-white mb-1">${t.resultsTitle}</h1>
              <p class="level-tag">${t.levelLabel}: <b>${state.result.levelEstimate}</b></p>
              <div class="charts-grid">${chartsHtml}</div>
              <div class="bg-slate-900 rounded-xl p-5 border border-slate-800 mb-4">
                <h2 class="text-amber-400 font-bold text-sm uppercase mb-2">${t.interpretationTitle}</h2>
                <p class="text-slate-300 text-sm leading-relaxed">${state.result.interpretation}</p>
              </div>
              <div class="bg-slate-900 rounded-xl p-5 border border-slate-800 mb-4">
                <h2 class="text-amber-400 font-bold text-sm uppercase mb-3">${t.opportunityTitle}</h2>
                <div class="space-y-3">${oppHtml}</div>
              </div>
              <div class="bg-gradient-to-br from-slate-800 to-slate-900 rounded-xl p-5 border border-amber-400/30">
                <h2 class="text-amber-400 font-bold text-sm mb-2">${t.ctaTitle}</h2>
                <p class="text-slate-300 text-sm leading-relaxed mb-4">${state.result.closing}</p>
                <a href="${FORM_LINK}" target="_blank" class="inline-flex items-center gap-2 bg-amber-400 hover:bg-amber-300 text-slate-900 font-semibold px-5 py-2.5 rounded-lg text-sm">${t.ctaBtn} ${Icons.ExternalLink()}</a>
              </div>
            </div>
          </div>
        `;
      }
    }

    window.setLang = (lang) => { state.lang = lang; render(); };
    window.toggleLang = () => { state.lang = state.lang === "en" ? "es" : "en"; render(); };
    window.setAnswer = (qType, axKey, value) => { const chart = CHART_ORDER.find(c => AXES[c].some(a => a.key === axKey)); if (chart) { state.answers[chart][axKey][qType] = value; renderQuestionStep(STR[state.lang]); } };
    window.goStep = (step) => { state.step = step; state.showWarn = false; render(); };
    window.goNext = () => { if (state.step >= 1 && state.step <= 3) { const chart = CHART_ORDER[state.step - 1]; const valid = AXES[chart].every(ax => { const v = state.answers[chart][ax.key]; return v.q1 !== null && v.q2 !== null && (!HAS_OBJ[chart] || v.obj !== null); }); if (!valid) { state.showWarn = true; renderQuestionStep(STR[state.lang]); return; } } state.showWarn = false; state.step++; render(); };
    window.goBack = () => { if (state.step > 0) state.step--; state.showWarn = false; render(); };
    window.submitAnalysis = async () => {
      const openValid = state.answers.openGoal.trim() && state.answers.openChallenge.trim();
      if (!openValid) { state.showWarn = true; renderQuestionStep(STR[state.lang]); return; }
      state.step = 5; state.loading = true; state.error = false; state.loadingIdx = 0; render();
      const interval = setInterval(() => { state.loadingIdx = (state.loadingIdx + 1) % STR[state.lang].loadingMsgs.length; render(); }, 1500);
      try { await new Promise(r => setTimeout(r, 1200)); state.result = generateAnalysis(); }
      catch (e) { console.error("Error:", e); state.error = true; }
      finally { clearInterval(interval); state.loading = false; render(); }
    };
    window.retry = () => { state.error = false; window.submitAnalysis(); };
    window.restart = () => { state = { lang: state.lang, step: 0, answers: emptyAnswers(), loading: false, loadingIdx: 0, error: false, result: null, showWarn: false }; render(); };
    render();
  </script>
</body>
</html>
